spring.datasource.url=jdbc:postgresql://localhost:5432/fitness_test
spring.datasource.username=fitness
spring.datasource.password=fitness_dev_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false
app.jwt.secret=integration-test-secret-must-be-32-chars!!
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=http://localhost
