name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fitness
          POSTGRES_PASSWORD: fitness_dev_password
          POSTGRES_DB: fitness_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fitness"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Run backend tests
        working-directory: backend
        run: gradle test --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-test-report
          path: backend/build/reports/

  e2e-tests:
    name: E2E Tests (QAF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Start dev environment (docker compose)
        run: docker compose up -d --build

      - name: Wait for backend
        run: |
          echo "Waiting for backend on http://localhost:8080..."
          # Backend is "up" once it returns any HTTP response (even 4xx) to a POST on /api/auth/login.
          # If it isn't listening yet, curl fails with exit 7 (connection refused).
          timeout 180 bash -c '
            until curl -s --max-time 5 -o /dev/null \
                      -X POST -H "Content-Type: application/json" -d "{}" \
                      http://localhost:8080/api/auth/login; do
              echo "  backend not ready yet..."
              sleep 3
            done
          '
          echo "Backend is up."

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend on http://localhost:5173..."
          timeout 120 bash -c 'until curl -sf http://localhost:5173/ -o /dev/null; do sleep 2; done'
          echo "Frontend is up."

      - name: Register test user
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          if [ -z "$TEST_USERNAME" ] || [ -z "$TEST_PASSWORD" ]; then
            echo "::error::TEST_USERNAME and TEST_PASSWORD repository secrets must be set"
            exit 1
          fi
          echo "Registering test user '$TEST_USERNAME'..."
          status=$(curl -s -o /tmp/register.out -w "%{http_code}" \
            -X POST http://localhost:5173/api/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$TEST_USERNAME\",\"password\":\"$TEST_PASSWORD\",\"email\":\"qaf@test.local\"}")
          echo "Register response: HTTP $status"
          cat /tmp/register.out || true
          if [ "$status" != "201" ] && [ "$status" != "400" ]; then
            echo "::error::Failed to register test user (status $status)"
            exit 1
          fi

      - name: Run E2E tests
        working-directory: qaf-tests
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon \
            -Denv.baseurl=http://localhost:5173 \
            -Dtest.user.username="$TEST_USERNAME" \
            -Dtest.user.password="$TEST_PASSWORD"

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "── backend logs ─────────────────────────────────"
          docker compose logs backend || true
          echo "── frontend logs ────────────────────────────────"
          docker compose logs frontend || true
          echo "── postgres logs ────────────────────────────────"
          docker compose logs postgres || true

      - name: Stop containers
        if: always()
        run: docker compose down -v

      - name: Upload E2E test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: |
            qaf-tests/test-results/
            qaf-tests/build/reports/
            qaf-tests/build/test-results/

  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests, e2e-tests]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.frontend-tests.result }}" != "success" ] || \
             [ "${{ needs.backend-tests.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "One or more test jobs failed."
            exit 1
          fi
          echo "All tests passed."
