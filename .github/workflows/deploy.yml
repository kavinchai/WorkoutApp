name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: fitness
          POSTGRES_PASSWORD: fitness_dev_password
          POSTGRES_DB: fitness_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fitness"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10'

      - name: Run backend tests
        working-directory: backend
        run: gradle test --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-test-report
          path: backend/build/reports/

  all-tests-pass:
    name: All Tests Pass
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.frontend-tests.result }}" != "success" ] || \
             [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "One or more test jobs failed."
            exit 1
          fi
          echo "All tests passed."
