name: Daily Weight to Google Calendar

on:
  schedule:
    - cron: '0 5 * * *'  # 5am UTC = midnight US Eastern (EST); 1am during EDT
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Backfill all historical weight data'
        type: boolean
        default: false
      target_date:
        description: 'Date to sync (YYYY-MM-DD). Defaults to yesterday if not set.'
        type: string
        default: ''

jobs:
  post-weight:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install psycopg2-binary google-api-python-client google-auth

      - name: Post weight to Google Calendar
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.KAVIN_WEIGHT_GOOGLE_CALENDAR_ID }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          BACKFILL: ${{ inputs.backfill || 'false' }}
          TARGET_DATE: ${{ inputs.target_date || '' }}
        run: |
          python - <<'EOF'
          import os
          import json
          import psycopg2
          from datetime import date, timedelta
          from urllib.parse import urlparse
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          backfill = os.environ['BACKFILL'].lower() == 'true'
          target_date_str = os.environ['TARGET_DATE'].strip()

          if target_date_str:
              target_date = date.fromisoformat(target_date_str)
          else:
              target_date = date.today() - timedelta(days=1)

          print(f"[config] backfill={backfill}, target_date={target_date}, today={date.today()}")

          # Connect to Railway Postgres
          url = urlparse(os.environ['RAILWAY_DATABASE_URL'])
          print(f"[db] connecting to {url.hostname}:{url.port}/{url.path.lstrip('/')}")
          conn = psycopg2.connect(
              host=url.hostname,
              port=url.port,
              database=url.path.lstrip('/'),
              user=url.username,
              password=url.password,
              sslmode='require'
          )
          cur = conn.cursor()

          # Verify user exists
          db_username = os.environ['DB_USERNAME']
          cur.execute("SELECT id, username FROM users WHERE username = %s", (db_username,))
          user = cur.fetchone()
          if not user:
              print(f"[error] No user found with username '{db_username}' — check DB_USERNAME secret.")
              cur.close()
              conn.close()
              exit(1)
          print(f"[db] found user: id={user[0]}, username={user[1]}")

          if backfill:
              print("[db] running backfill query for all weight entries...")
              cur.execute("""
                  SELECT wl.log_date, wl.weight_lbs
                  FROM weight_log wl
                  JOIN users u ON u.id = wl.user_id
                  WHERE u.username = %s
                  ORDER BY wl.log_date
              """, (db_username,))
          else:
              print(f"[db] querying weight for date: {target_date}")
              cur.execute("""
                  SELECT wl.log_date, wl.weight_lbs
                  FROM weight_log wl
                  JOIN users u ON u.id = wl.user_id
                  WHERE u.username = %s
                    AND wl.log_date = %s
              """, (db_username, target_date))

          rows = cur.fetchall()
          print(f"[db] rows returned: {len(rows)}")
          for r in rows:
              print(f"  → {r}")
          cur.close()
          conn.close()

          if not rows:
              print("No weight entries found, skipping.")
              exit(0)

          # Authenticate with Google Calendar
          sa_info = json.loads(os.environ['GOOGLE_SERVICE_ACCOUNT_JSON'])
          creds = service_account.Credentials.from_service_account_info(
              sa_info,
              scopes=['https://www.googleapis.com/auth/calendar']
          )
          service = build('calendar', 'v3', credentials=creds)
          calendar_id = os.environ['GOOGLE_CALENDAR_ID']

          def event_exists(log_date):
              day_str = str(log_date)
              result = service.events().list(
                  calendarId=calendar_id,
                  timeMin=f'{day_str}T00:00:00Z',
                  timeMax=f'{day_str}T23:59:59Z',
                  singleEvents=True,
                  q='Weight:'
              ).execute()
              return any(
                  e.get('summary', '').startswith('Weight:')
                  for e in result.get('items', [])
              )

          for log_date, weight_lbs in rows:
              if event_exists(log_date):
                  print(f"[skip] event already exists for {log_date}")
                  continue
              weight = float(weight_lbs)
              event = {
                  'summary': f'Weight: {weight} lbs',
                  'start': {'date': str(log_date)},
                  'end':   {'date': str(log_date)},
              }
              created = service.events().insert(
                  calendarId=calendar_id,
                  body=event
              ).execute()
              print(f"[created] Weight: {weight} lbs on {log_date} → {created.get('htmlLink')}")
          EOF
