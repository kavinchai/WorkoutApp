name: Database Backup

on:
  schedule:
    - cron: '0 7 * * *'  # 7am UTC = 2am ET (3am EDT) — quiet hours
  workflow_dispatch:
    inputs:
      retention_days:
        description: 'How long to keep this dump (1-90 days)'
        type: string
        default: '30'

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install Postgres 16 client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-16

      - name: Dump database
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
        run: |
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          OUTFILE="fitness-${TIMESTAMP}.dump"
          echo "Writing backup to ${OUTFILE}"
          pg_dump "${RAILWAY_DATABASE_URL}" \
            --format=custom \
            --no-owner \
            --no-acl \
            --file="${OUTFILE}"
          ls -lh "${OUTFILE}"
          echo "OUTFILE=${OUTFILE}" >> $GITHUB_ENV

      - name: Verify dump is restorable
        run: |
          pg_restore --list "${OUTFILE}" | head -20
          echo "Dump is valid"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTFILE }}
          path: ${{ env.OUTFILE }}
          retention-days: ${{ inputs.retention_days || 30 }}
          if-no-files-found: error
