name: Daily Workout to Google Calendar

on:
  schedule:
    - cron: '0 5 * * *'  # 5am UTC = midnight US Eastern (EST); 1am during EDT
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Backfill all historical workout data'
        type: boolean
        default: false

jobs:
  post-workout:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install psycopg2-binary google-api-python-client google-auth

      - name: Post workout to Google Calendar
        env:
          RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.KAVIN_WORKOUT_GOOGLE_CALENDAR_ID }}
          BACKFILL: ${{ inputs.backfill || 'false' }}
        run: |
          python - <<'EOF'
          import os
          import json
          import psycopg2
          from datetime import date, timedelta
          from urllib.parse import urlparse
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          backfill = os.environ['BACKFILL'].lower() == 'true'
          yesterday = date.today() - timedelta(days=1)

          # Query Railway Postgres
          url = urlparse(os.environ['RAILWAY_DATABASE_URL'])
          conn = psycopg2.connect(
              host=url.hostname,
              port=url.port,
              database=url.path.lstrip('/'),
              user=url.username,
              password=url.password,
              sslmode='require'
          )
          cur = conn.cursor()

          if backfill:
              cur.execute("""
                  SELECT ws.session_date, ws.session_name, ws.completion_pct
                  FROM workout_session ws
                  JOIN users u ON u.id = ws.user_id
                  WHERE u.username = '***REDACTED_USER***'
                    AND ws.session_name IS NOT NULL
                  ORDER BY ws.session_date, ws.id
              """)
          else:
              cur.execute("""
                  SELECT ws.session_date, ws.session_name, ws.completion_pct
                  FROM workout_session ws
                  JOIN users u ON u.id = ws.user_id
                  WHERE u.username = '***REDACTED_USER***'
                    AND ws.session_date = %s
                    AND ws.session_name IS NOT NULL
                  ORDER BY ws.id
              """, (yesterday,))

          rows = cur.fetchall()
          cur.close()
          conn.close()

          if not rows:
              print("No workout sessions found, skipping.")
              exit(0)

          # Authenticate with Google Calendar
          sa_info = json.loads(os.environ['GOOGLE_SERVICE_ACCOUNT_JSON'])
          creds = service_account.Credentials.from_service_account_info(
              sa_info,
              scopes=['https://www.googleapis.com/auth/calendar']
          )
          service = build('calendar', 'v3', credentials=creds)
          calendar_id = os.environ['GOOGLE_CALENDAR_ID']

          def event_exists(session_date, session_name):
              day_str = str(session_date)
              result = service.events().list(
                  calendarId=calendar_id,
                  timeMin=f'{day_str}T00:00:00Z',
                  timeMax=f'{day_str}T23:59:59Z',
                  singleEvents=True,
                  q=session_name
              ).execute()
              return any(
                  e.get('summary', '').startswith(session_name)
                  for e in result.get('items', [])
              )

          for session_date, session_name, completion_pct in rows:
              if event_exists(session_date, session_name):
                  print(f"Event already exists for {session_name} on {session_date}, skipping.")
                  continue
              summary = f'{session_name} — {completion_pct}%'
              event = {
                  'summary': summary,
                  'start': {'date': str(session_date)},
                  'end':   {'date': str(session_date)},
              }
              created = service.events().insert(
                  calendarId=calendar_id,
                  body=event
              ).execute()
              print(f"Event created: {summary} on {session_date} → {created.get('htmlLink')}")
          EOF
